<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Scientific Calculator</title>
    <style>
        /* --- Premium UI/UX Variables --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #09090b, #18181b, #27272a);
            --calc-bg: rgba(24, 24, 27, 0.85);
            --calc-border: rgba(255, 255, 255, 0.1);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --text-accent: #06b6d4; /* Professional Cyan Accent */
            
            --btn-bg: rgba(39, 39, 42, 0.6);
            --btn-hover: rgba(63, 63, 70, 0.8);
            --btn-active: rgba(82, 82, 91, 0.9);
            
            --btn-op-bg: rgba(6, 182, 212, 0.15);
            --btn-op-text: #22d3ee;
            
            --btn-danger-bg: rgba(239, 68, 68, 0.15);
            --btn-danger-text: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none; 
            -webkit-user-select: none;
            padding: 20px;
        }

        .calculator {
            background: var(--calc-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 420px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            border: 1px solid var(--calc-border);
            padding: 25px;
        }

        /* --- Display Area --- */
        .display {
            padding: 10px 10px 20px;
            text-align: right;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border-bottom: 1px solid var(--calc-border);
            margin-bottom: 20px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: auto;
            font-weight: 600;
            letter-spacing: 1px;
        }

        #deg-rad-indicator {
            color: var(--text-accent);
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 8px;
            background: rgba(6, 182, 212, 0.1);
            transition: 0.2s;
        }

        #deg-rad-indicator:hover {
            background: rgba(6, 182, 212, 0.2);
        }

        .previous-operand {
            color: var(--text-muted);
            font-size: 1.3rem;
            min-height: 30px;
            word-wrap: break-word;
        }

        .current-operand {
            color: var(--text-main);
            font-size: 3.5rem;
            font-weight: 300;
            word-wrap: break-word;
            letter-spacing: 1px;
            overflow-x: auto;
        }

        /* --- Buttons Grid --- */
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            background-color: var(--btn-bg);
            padding: 16px 10px;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:active {
            transform: scale(0.92);
            background-color: var(--btn-active);
        }

        @media (hover: hover) {
            button:hover { background-color: var(--btn-hover); }
        }

        /* --- Specific Button Styles --- */
        .operator {
            background-color: var(--btn-op-bg);
            color: var(--btn-op-text);
            font-weight: 600;
            font-size: 1.3rem;
        }

        .scientific {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .equals {
            background-color: var(--text-accent);
            color: #000;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .clear, .delete {
            background-color: var(--btn-danger-bg);
            color: var(--btn-danger-text);
            font-weight: 600;
        }

        .span-two { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="status-bar">
                <span id="deg-rad-indicator" onclick="toggleAngleMode()" title="Click to toggle Degree/Radian">RAD</span>
                <span>Physics & Math Pro</span>
            </div>
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
        </div>
        
        <div class="buttons">
            <button class="scientific" onclick="appendConstant(Math.PI, 'π')">π</button>
            <button class="scientific" onclick="appendConstant(Math.E, 'e')">e</button>
            <button class="clear span-two" id="clear">AC</button>
            <button class="delete" id="delete">DEL</button>

            <button class="scientific" onclick="computeSingle('sin')">sin</button>
            <button class="scientific" onclick="computeSingle('cos')">cos</button>
            <button class="scientific" onclick="computeSingle('tan')">tan</button>
            <button class="scientific" onclick="computeSingle('log')">log</button>
            <button class="scientific" onclick="computeSingle('ln')">ln</button>

            <button class="scientific" onclick="computeSingle('sqrt')">√x</button>
            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="operator" data-action="divide">÷</button>

            <button class="scientific" onclick="computeSingle('square')">x²</button>
            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="operator" data-action="multiply">×</button>

            <button class="scientific" onclick="chooseOperation('power', '^')">x^y</button>
            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="operator" data-action="subtract">−</button>

            <button class="scientific" title="Speed of Light" onclick="appendConstant(299792458, 'c')">c</button>
            <button class="scientific" title="Gravity" onclick="appendConstant(9.80665, 'g')">g</button>
            <button class="number">0</button>
            <button class="number">.</button>
            <button class="operator" data-action="add">+</button>
            
            <button class="equals span-two" style="grid-column: span 5; margin-top: 5px;" id="equals">=</button>
        </div>
    </div>

    <script>
        // State Variables
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;
        let isDegree = false; // Angle mode toggle

        // DOM Elements
        const currentOperandTextElement = document.getElementById('current-operand');
        const previousOperandTextElement = document.getElementById('previous-operand');
        const angleIndicator = document.getElementById('deg-rad-indicator');
        
        const numberButtons = document.querySelectorAll('.number');
        const operationButtons = document.querySelectorAll('.operator');
        const equalsButton = document.getElementById('equals');
        const deleteButton = document.getElementById('delete');
        const clearButton = document.getElementById('clear');

        // --- Core Calculator Functions ---

        function clear() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
        }

        function deleteNumber() {
            if (currentOperand === '0' || currentOperand === 'Error') return;
            currentOperand = currentOperand.toString().slice(0, -1);
            if (currentOperand === '' || currentOperand === '-') currentOperand = '0';
        }

        function appendNumber(number) {
            if (currentOperand === 'Error') clear();
            if (number === '.' && currentOperand.includes('.')) return;
            if (currentOperand === '0' && number !== '.') {
                currentOperand = number.toString();
            } else {
                currentOperand = currentOperand.toString() + number.toString();
            }
        }

        // For Physics & Math Constants
        function appendConstant(value, symbol) {
            if (currentOperand === 'Error') clear();
            currentOperand = value.toString();
            updateDisplay();
        }

        function toggleAngleMode() {
            isDegree = !isDegree;
            angleIndicator.innerText = isDegree ? 'DEG' : 'RAD';
        }

        // Standard Two-Operand Operations (+, -, *, /, ^)
        function chooseOperation(op, symbol) {
            if (currentOperand === 'Error') clear();
            if (currentOperand === '0' && previousOperand === '') return;
            if (previousOperand !== '') {
                compute();
            }
            operation = op;
            previousOperand = currentOperand + ' ' + symbol;
            currentOperand = '0';
        }

        // Single-Operand Scientific Operations (sin, cos, sqrt, etc.)
        function computeSingle(action) {
            if (currentOperand === 'Error') return;
            let current = parseFloat(currentOperand);
            if (isNaN(current)) return;

            let result;
            let angle = current;

            // Convert degree to radians for trig functions if DEG mode is active
            if (isDegree && ['sin', 'cos', 'tan'].includes(action)) {
                angle = current * (Math.PI / 180);
            }

            try {
                switch (action) {
                    case 'sin': result = Math.sin(angle); break;
                    case 'cos': result = Math.cos(angle); break;
                    case 'tan': 
                        if (isDegree && current % 90 === 0 && current % 180 !== 0) throw "Undefined";
                        result = Math.tan(angle); 
                        break;
                    case 'log': 
                        if (current <= 0) throw "Error";
                        result = Math.log10(current); 
                        break;
                    case 'ln': 
                        if (current <= 0) throw "Error";
                        result = Math.log(current); 
                        break;
                    case 'sqrt': 
                        if (current < 0) throw "Error";
                        result = Math.sqrt(current); 
                        break;
                    case 'square': result = Math.pow(current, 2); break;
                }

                // Handling javascript floating point precision issues (e.g. sin(PI) !== 0)
                result = Math.round(result * 1e12) / 1e12;
                currentOperand = result.toString();
                
            } catch (error) {
                currentOperand = 'Error';
            }
            
            updateDisplay();
        }

        // Main Computation Logic
        function compute() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case 'add': computation = prev + current; break;
                case 'subtract': computation = prev - current; break;
                case 'multiply': computation = prev * current; break;
                case 'divide':
                    if (current === 0) {
                        currentOperand = 'Error';
                        operation = undefined;
                        previousOperand = '';
                        return;
                    }
                    computation = prev / current; 
                    break;
                case 'power': computation = Math.pow(prev, current); break;
                default: return;
            }
            
            computation = Math.round(computation * 1e12) / 1e12; // Fix float precision
            currentOperand = computation.toString();
            operation = undefined;
            previousOperand = '';
        }

        // Display Formatting
        function formatDisplayNumber(number) {
            if (number === 'Error') return number;
            
            const stringNumber = number.toString();
            // Using exponential format for very large numbers
            if (stringNumber.length > 12 && !stringNumber.includes('.')) {
                return parseFloat(number).toExponential(5);
            }

            const integerDigits = parseFloat(stringNumber.split('.')[0]);
            const decimalDigits = stringNumber.split('.')[1];
            let integerDisplay;
            
            if (isNaN(integerDigits)) {
                integerDisplay = '';
            } else {
                integerDisplay = integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
            }
            
            if (decimalDigits != null) {
                return `${integerDisplay}.${decimalDigits}`;
            } else {
                return integerDisplay;
            }
        }

        function updateDisplay() {
            if (currentOperand === '0' && currentOperand.length === 1) {
                currentOperandTextElement.innerText = currentOperand;
            } else if (currentOperand === '-') {
                currentOperandTextElement.innerText = '-';
            } else {
                currentOperandTextElement.innerText = formatDisplayNumber(currentOperand);
            }
            
            if (operation != null) {
                previousOperandTextElement.innerText = previousOperand;
            } else {
                previousOperandTextElement.innerText = '';
            }
        }

        // --- Event Listeners ---
        numberButtons.forEach(button => {
            button.addEventListener('click', () => {
                appendNumber(button.innerText);
                updateDisplay();
            });
        });

        operationButtons.forEach(button => {
            button.addEventListener('click', () => {
                chooseOperation(button.getAttribute('data-action'), button.innerText);
                updateDisplay();
            });
        });

        equalsButton.addEventListener('click', () => {
            compute();
            updateDisplay();
        });

        clearButton.addEventListener('click', () => {
            clear();
            updateDisplay();
        });

        deleteButton.addEventListener('click', () => {
            deleteNumber();
            updateDisplay();
        });
        
        // Keyboard support (Bonus feature for pro-level UX)
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9' || e.key === '.') appendNumber(e.key);
            if (e.key === '=' || e.key === 'Enter') compute();
            if (e.key === 'Backspace') deleteNumber();
            if (e.key === 'Escape') clear();
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                const actionMap = {'+': 'add', '-': 'subtract', '*': 'multiply', '/': 'divide'};
                const symbolMap = {'+': '+', '-': '−', '*': '×', '/': '÷'};
                chooseOperation(actionMap[e.key], symbolMap[e.key]);
            }
            updateDisplay();
        });
    </script>
</body>
</html>
