<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pro Calculator</title>
    <style>
        /* Premium Dark Theme Variables */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --calc-bg: #1e1e24;
            --calc-border: #2b2b36;
            --text-main: #ffffff;
            --text-muted: #8e8e9f;
            --btn-num-bg: #2b2b36;
            --btn-num-hover: #3f3f4e;
            --btn-num-active: #545468;
            --btn-op-bg: #ff9500; /* Professional Orange Accent */
            --btn-op-hover: #ffaa33;
            --btn-op-active: #cc7700;
            --btn-danger-bg: #ff3b30;
            --btn-danger-hover: #ff6b63;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Prevents selecting text while tapping fast */
            user-select: none; 
            -webkit-user-select: none;
        }

        .calculator {
            background-color: var(--calc-bg);
            width: 340px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid var(--calc-border);
            overflow: hidden;
            padding: 20px;
        }

        /* Display Area */
        .display {
            padding: 20px 10px 30px;
            text-align: right;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .previous-operand {
            color: var(--text-muted);
            font-size: 1.2rem;
            min-height: 28px;
            word-wrap: break-word;
            letter-spacing: 1px;
        }

        .current-operand {
            color: var(--text-main);
            font-size: 3rem;
            font-weight: 300;
            word-wrap: break-word;
            letter-spacing: 2px;
            overflow-x: auto;
        }

        /* Buttons Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 16px;
            background-color: var(--btn-num-bg);
            padding: 20px 15px;
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Mobile Touch Feedback */
        button:active {
            transform: scale(0.95);
            background-color: var(--btn-num-active);
        }

        /* Hover effects (visible if checked on a PC later) */
        @media (hover: hover) {
            button:hover {
                background-color: var(--btn-num-hover);
            }
        }

        /* Specific Button Styles */
        .operator {
            background-color: var(--btn-op-bg);
            color: white;
            font-size: 1.6rem;
            box-shadow: 0 4px 15px rgba(255, 149, 0, 0.2);
        }

        @media (hover: hover) {
            .operator:hover { background-color: var(--btn-op-hover); }
        }
        .operator:active { background-color: var(--btn-op-active); }

        .equals {
            background-color: var(--btn-op-bg);
            grid-column: span 2;
        }

        .clear, .delete {
            background-color: #3f3f4e;
            color: #ff6b63;
            font-weight: 600;
        }

        .span-two {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
        </div>
        <div class="buttons">
            <button class="clear span-two" id="clear">AC</button>
            <button class="delete" id="delete">DEL</button>
            <button class="operator" data-action="divide">÷</button>

            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="operator" data-action="multiply">×</button>

            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="operator" data-action="subtract">−</button>

            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="operator" data-action="add">+</button>

            <button class="number span-two">0</button>
            <button class="number">.</button>
            <button class="equals operator" id="equals">=</button>
        </div>
    </div>

    <script>
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;

        const currentOperandTextElement = document.getElementById('current-operand');
        const previousOperandTextElement = document.getElementById('previous-operand');

        const numberButtons = document.querySelectorAll('.number');
        const operationButtons = document.querySelectorAll('.operator:not(#equals)');
        const equalsButton = document.getElementById('equals');
        const deleteButton = document.getElementById('delete');
        const clearButton = document.getElementById('clear');

        function clear() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
        }

        function deleteNumber() {
            if (currentOperand === '0') return;
            currentOperand = currentOperand.toString().slice(0, -1);
            if (currentOperand === '') currentOperand = '0';
        }

        function appendNumber(number) {
            if (number === '.' && currentOperand.includes('.')) return;
            if (currentOperand === '0' && number !== '.') {
                currentOperand = number.toString();
            } else {
                currentOperand = currentOperand.toString() + number.toString();
            }
        }

        function chooseOperation(op, symbol) {
            if (currentOperand === '0' && previousOperand === '') return;
            if (previousOperand !== '') {
                compute();
            }
            operation = op;
            previousOperand = currentOperand + ' ' + symbol;
            currentOperand = '0';
        }

        function compute() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case 'add': computation = prev + current; break;
                case 'subtract': computation = prev - current; break;
                case 'multiply': computation = prev * current; break;
                case 'divide':
                    if (current === 0) {
                        alert("Cannot divide by zero");
                        clear();
                        updateDisplay();
                        return;
                    }
                    computation = prev / current; 
                    break;
                default: return;
            }
            
            // Format to avoid long decimals like 0.30000000000000004
            computation = Math.round(computation * 100000000) / 100000000;
            currentOperand = computation.toString();
            operation = undefined;
            previousOperand = '';
        }

        function formatDisplayNumber(number) {
            const stringNumber = number.toString();
            const integerDigits = parseFloat(stringNumber.split('.')[0]);
            const decimalDigits = stringNumber.split('.')[1];
            let integerDisplay;
            
            if (isNaN(integerDigits)) {
                integerDisplay = '';
            } else {
                integerDisplay = integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
            }
            
            if (decimalDigits != null) {
                return `${integerDisplay}.${decimalDigits}`;
            } else {
                return integerDisplay;
            }
        }

        function updateDisplay() {
            if (currentOperand === '0' && currentOperand.length === 1) {
                currentOperandTextElement.innerText = currentOperand;
            } else if (currentOperand === '-') {
                currentOperandTextElement.innerText = '-';
            } else {
                currentOperandTextElement.innerText = formatDisplayNumber(currentOperand);
            }
            
            if (operation != null) {
                previousOperandTextElement.innerText = previousOperand;
            } else {
                previousOperandTextElement.innerText = '';
            }
        }

        numberButtons.forEach(button => {
            button.addEventListener('click', () => {
                appendNumber(button.innerText);
                updateDisplay();
            });
        });

        operationButtons.forEach(button => {
            button.addEventListener('click', () => {
                chooseOperation(button.getAttribute('data-action'), button.innerText);
                updateDisplay();
            });
        });

        equalsButton.addEventListener('click', () => {
            compute();
            updateDisplay();
        });

        clearButton.addEventListener('click', () => {
            clear();
            updateDisplay();
        });

        deleteButton.addEventListener('click', () => {
            deleteNumber();
            updateDisplay();
        });
    </script>
</body>
</html>
